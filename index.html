<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SJK Affiliate CRM</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F5F5F3; font-family: -apple-system, "Helvetica Neue", sans-serif; }
#root { min-height: 100vh; }
#loading {
  position: fixed; inset: 0; background: #111;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-family: -apple-system, sans-serif; z-index: 9999;
  transition: opacity 0.4s;
}
.brand { font-size: 11px; letter-spacing: 0.15em; color: rgba(255,255,255,0.4); margin-bottom: 8px; text-transform: uppercase; }
.app-title { font-size: 22px; font-weight: 800; margin-bottom: 24px; }
.spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
.msg { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 14px; }
.err { font-size: 12px; color: #ff6b6b; margin-top: 14px; max-width: 320px; text-align: center; line-height: 1.6; padding: 0 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="brand">SJ Kitchen</div>
  <div class="app-title">Affiliate CRM</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="loadMsg">Memuat data...</div>
  <div class="err" id="loadErr" style="display:none"></div>
</div>

<div id="root"></div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:none; position:fixed; inset:0; background:#111; z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:-apple-system,sans-serif;">
  <div style="width:100%; max-width:360px; padding:0 24px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:8px;">SJ Kitchen</div>
      <div style="font-size:24px; font-weight:800; color:#fff;">Affiliate CRM</div>
    </div>
    <div id="loginError" style="display:none; background:#CC1F1F; color:#fff; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:16px; text-align:center;"></div>
    <div style="margin-bottom:12px;">
      <input id="loginEmail" type="email" placeholder="Email" style="width:100%; padding:12px 14px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; font-family:inherit; outline:none; box-sizing:border-box;" />
    </div>
    <div style="margin-bottom:20px;">
      <input id="loginPassword" type="password" placeholder="Password" style="width:100%; padding:12px 14px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; font-family:inherit; outline:none; box-sizing:border-box;" />
    </div>
    <button id="loginBtn" onclick="doLogin()" style="width:100%; padding:13px; border-radius:6px; background:#fff; color:#111; border:none; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;">Masuk</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─── SUPABASE CONFIG ───────────────────────────────────────────────
var SUPA_URL = "https://apmzwsymrfmeunhxrnvy.supabase.co";
var SUPA_KEY = "sb_publishable_7qPAlYxvxckcDQiOwmAQrg_LP8USo_z";
var supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);

async function getAuthToken() {
  var result = await supabaseClient.auth.getSession();
  var session = result.data && result.data.session;
  return (session && session.access_token) ? session.access_token : SUPA_KEY;
}

function supaFetch(path, options) {
  var url = SUPA_URL + "/rest/v1/" + path;
  return getAuthToken().then(function(token) {
  var opts = Object.assign({
    headers: {
      "apikey": SUPA_KEY,
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    }
  }, options || {});
  return fetch(url, opts).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + ": " + t); });
    return r.json();
  });
  }); // close getAuthToken().then
}

// ─── CRM DATA LAYER ────────────────────────────────────────────────
window.CRM_DATA = {
  affiliates: [],
  sow: [],
  tracker: { tikTok: 0, wa: 0, cap: 65 },

  updateStatus: function(rowIndex, updates) {
    var aff = this.affiliates.find(function(a) { return a.rowIndex === rowIndex; });
    if (!aff) return Promise.resolve();
    var patch = {};
    if (updates.status !== undefined)         patch.status = updates.status;
    if (updates.tglKontak !== undefined)       patch.tgl_kontak = updates.tglKontak;
    if (updates.reapproachDate !== undefined)  patch.reapproach_date = updates.reapproachDate;
    if (updates.remarks !== undefined)         patch.remarks = updates.remarks;
    if (updates.contactConfirm !== undefined)  patch.contact_confirm = updates.contactConfirm;
    return supaFetch("affiliates?id=eq." + aff.id, {
      method: "PATCH",
      body: JSON.stringify(patch)
    });
  },

  logContact: function(channel) {
    var today = new Date().toISOString().split("T")[0];
    var self = this;
    return supaFetch("daily_tracker?tanggal=eq." + today).then(function(rows) {
      if (rows && rows.length > 0) {
        var row = rows[0];
        var patch = {};
        if (channel === "WA") { patch.whatsapp = (row.whatsapp || 0) + 1; self.tracker.wa = patch.whatsapp; }
        if (channel === "TikTok") { patch.tiktok_dm = (row.tiktok_dm || 0) + 1; self.tracker.tikTok = patch.tiktok_dm; }
        return supaFetch("daily_tracker?id=eq." + row.id, { method: "PATCH", body: JSON.stringify(patch) });
      } else {
        var newRow = { tanggal: today, tiktok_dm: channel === "TikTok" ? 1 : 0, whatsapp: channel === "WA" ? 1 : 0, cap: 65 };
        if (channel === "WA") self.tracker.wa = 1;
        if (channel === "TikTok") self.tracker.tikTok = 1;
        return supaFetch("daily_tracker", { method: "POST", body: JSON.stringify(newRow) });
      }
    });
  },

  addAffiliate: function(data) {
    var today = new Date().toISOString().split("T")[0];
    return supaFetch("affiliates", {
      method: "POST",
      body: JSON.stringify({
        listing_date: today,
        username: data.username,
        niche: data.niche || null,
        profile_link: data.linkTiktok || null,
        wa: data.wa || null,
        followers: data.followers || null,
        gmv: data.gmv || null,
        activation: data.activation || "SV",
        kurasi: data.kurasi || "No",
        status: data.kurasi === "Yes" ? "" : "Not Relevant",
        remarks: data.kurasiAlasan || null,
      })
    });
  },

  addVT: function(username, vtLink, vtIndex) {
    var today = new Date().toISOString().split("T")[0];
    var sowEntry = this.sow.find(function(s) { return s.username === username; });
    if (!sowEntry) return Promise.reject(new Error("SOW not found"));
    var patch = {};
    var linkKeys = ["vt1_link","vt2_link","vt3_link","vt4_link"];
    var tglKeys  = ["tgl_vt1","tgl_vt2","tgl_vt3","tgl_vt4"];
    patch[linkKeys[vtIndex]] = vtLink;
    patch[tglKeys[vtIndex]]  = today;
    patch.total_vt = (sowEntry.vts ? sowEntry.vts.length : 0) + 1;
    patch.status = patch.total_vt >= 4 ? "SOW Lengkap" : "On Progress";
    return supaFetch("sow?id=eq." + sowEntry.id, { method: "PATCH", body: JSON.stringify(patch) });
  },

  insertSOW: function(username, tglKirim, aff) {
    var today = tglKirim || new Date().toISOString().split("T")[0];
    var h7  = new Date(today); h7.setDate(h7.getDate()+7);
    var h12 = new Date(today); h12.setDate(h12.getDate()+12);
    var h14 = new Date(today); h14.setDate(h14.getDate()+14);
    var fmt = function(d) { return d.toISOString().split("T")[0]; };
    return supaFetch("sow", {
      method: "POST",
      body: JSON.stringify({
        username: username,
        nama_wa: (aff && aff.wa) || null,
        niche: (aff && aff.niche) || null,
        tgl_deal: today,
        product_sample: "Tempe Tabur (Ori + Pedas + Komplit)",
        tgl_kirim: today,
        h7: fmt(h7),
        h12: fmt(h12),
        h14: fmt(h14),
        total_vt: 0,
        vt_target: 4,
        live_count: 0,
        status: "Barang Dikirim",
        komisi: 6,
      })
    });
  },
};

// ─── LOAD DATA ─────────────────────────────────────────────────────
function toSection(a) {
  var kurasi = a.kurasi || "";
  var status = a.status || "";
  var tgl = a.tgl_kontak;
  var reapproach = a.reapproach_date;

  if (status === "Not Relevant") return "done";
  if (kurasi !== "Yes") return "done";
  if (status === "Approved") return "done";

  // On Discuss → follow up
  if (status === "On Discuss") return "followup";

  // Re-approach due
  if ((status === "Not Response" || status === "Reject") && reapproach && new Date(reapproach) <= new Date()) {
    return "reapproach";
  }

  // Not Response → waiting (still in conversation window)
  if (status === "Not Response" && tgl) return "waiting";

  // Reject not yet due → hide
  if (status === "Reject") return "done";

  // Never contacted → new
  if (!tgl && (!status || status === "" || status === "Baru")) return "new";

  // Contacted but no status yet → waiting
  if (tgl && (!status || status === "")) return "waiting";

  return "done";
}

function toSOWSection(s) {
  var st = s.status || "";
  if (st === "SOW Lengkap") return "sow_complete";
  if (st === "On Progress") return "sow_active";
  if (st === "Barang Dikirim" || st === "" || st === null) return "sow_sample";
  if (st === "Belum Kirim") return "sow_sample";
  return "sow_sample"; // default show in sample
}

function mapAffiliate(a) {
  var channels = [];
  var cc = (a.contact_confirm || "").toLowerCase();
  if (cc.includes("wa")) channels.push({ type:"WA", sent:true });
  if (cc.includes("dm")) channels.push({ type:"TikTok DM", sent:true });
  var section = toSection(a);
  return {
    id: a.id,
    rowIndex: a.id,
    username: a.username,
    niche: a.niche || "",
    linkTiktok: a.profile_link || "",
    wa: a.wa && a.wa !== "WhatsApp" ? a.wa.replace(/\D/g,"") || null : null,
    followers: a.followers || "",
    gmv: a.gmv || "",
    activation: a.activation || "SV",
    kurasi: a.kurasi || "",
    status: a.status || "Baru",
    tglKontak: a.tgl_kontak || null,
    reapproachDate: a.reapproach_date || null,
    notes: a.remarks || null,
    section: section,
    channels: channels,
    waValid: null,
  };
}

function mapSOW(s) {
  var vts = [];
  if (s.vt1_link) vts.push({ link: s.vt1_link, tgl: s.tgl_vt1 });
  if (s.vt2_link) vts.push({ link: s.vt2_link, tgl: s.tgl_vt2 });
  if (s.vt3_link) vts.push({ link: s.vt3_link, tgl: s.tgl_vt3 });
  if (s.vt4_link) vts.push({ link: s.vt4_link, tgl: s.tgl_vt4 });
  return {
    id: s.id,
    rowIndex: s.id,
    username: s.username,
    namaWA: s.nama_wa || "",
    tglKirim: s.tgl_kirim || "",
    h7: s.h7, h12: s.h12, h14: s.h14,
    vts: vts,
    totalVT: s.total_vt || 0,
    status: s.status || "",
    gmv: s.gmv || "",
    komisi: s.komisi || 6,
    notes: s.notes || "",
    section: toSOWSection(s),
    sowStart: vts.length > 0 ? vts[0].tgl : null,
    wa: null, followers: "", niche: s.niche || "",
  };
}

function loadData() {
  document.getElementById("loadMsg").textContent = "Menghubungi database...";
  var today = new Date().toISOString().split("T")[0];

  var today30 = new Date(); today30.setDate(today30.getDate()-30);
  var date30 = today30.toISOString().split("T")[0];

  // Server-side filter: only load relevant affiliates
  var filters = [
    // 1. Belum dikontak sama sekali (Affiliate Tersedia)
    "affiliates?select=*&kurasi=eq.Yes&tgl_kontak=is.null&status=in.(,Baru)&order=listing_date.asc&limit=200",
    // 2. Menunggu balasan (dikontak, belum balas, dalam 30 hari)
    "affiliates?select=*&kurasi=eq.Yes&status=eq.Not Response&tgl_kontak=gte." + date30 + "&order=tgl_kontak.asc&limit=500",
    // 3. On Discuss
    "affiliates?select=*&kurasi=eq.Yes&status=eq.On Discuss&order=tgl_kontak.asc",
    // 4. Re-approach due today
    "affiliates?select=*&kurasi=eq.Yes&reapproach_date=lte." + today + "&status=in.(Not Response,Reject)&order=reapproach_date.asc&limit=100",
  ];

  return Promise.all([
    Promise.all(filters.map(function(f) { return supaFetch(f); })).then(function(results) {
      // Merge and deduplicate by id
      var seen = {};
      var merged = [];
      results.forEach(function(rows) {
        (rows || []).forEach(function(row) {
          if (!seen[row.id]) { seen[row.id] = true; merged.push(row); }
        });
      });
      return merged;
    }),
    supaFetch("sow?select=*&order=id.asc"),
    supaFetch("daily_tracker?tanggal=eq." + today),
  ]).then(function(results) {
    var affs = results[0] || [];
    var sows = results[1] || [];
    var tracker = results[2] && results[2][0];

    window.CRM_DATA.affiliates = affs.map(mapAffiliate);
    window.CRM_DATA.sow = sows.map(mapSOW);
    window.CRM_DATA.tracker = tracker
      ? { tikTok: tracker.tiktok_dm || 0, wa: tracker.whatsapp || 0, cap: tracker.cap || 65 }
      : { tikTok: 0, wa: 0, cap: 65 };

    document.getElementById("loadMsg").textContent =
      window.CRM_DATA.affiliates.length + " affiliates dimuat";
  });
}
</script>

<script>
async function doLogin() {
  var email = document.getElementById("loginEmail").value;
  var password = document.getElementById("loginPassword").value;
  var btn = document.getElementById("loginBtn");
  var errEl = document.getElementById("loginError");
  
  btn.textContent = "Masuk...";
  btn.disabled = true;
  errEl.style.display = "none";

  var result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
  
  if (result.error) {
    errEl.textContent = "Email atau password salah";
    errEl.style.display = "block";
    btn.textContent = "Masuk";
    btn.disabled = false;
    return;
  }

  // Login success
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("loading").style.display = "flex";
  startApp();
}

// Enter key support
document.addEventListener("DOMContentLoaded", function() {
  ["loginEmail","loginPassword"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
  });
});

async function startApp() {
  try {
    await loadData();
    var el = document.getElementById("loading");
    el.style.opacity = "0";
    setTimeout(function() { el.style.display = "none"; }, 400);
    window.__mountCRM();
  } catch(err) {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("loadMsg").style.display = "none";
    var errEl = document.getElementById("loadErr");
    errEl.style.display = "block";
    errEl.textContent = "Error: " + err.message;
    console.error(err);
  }
}

// Check if already logged in
(async function() {
  var result = await supabaseClient.auth.getSession();
  if (result.data && result.data.session) {
    // Already logged in
    startApp();
  } else {
    // Show login screen
    document.getElementById("loading").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
  }
})();
</script>
